services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodapp
    ports:
      - "8080:8080"
    volumes:
      - pgdata:
    restart: unless-stopped
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "5555:5555"

volumes:
  pgdata:
